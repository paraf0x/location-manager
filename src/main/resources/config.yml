# BaseManager Configuration
# Location and waypoint management plugin

# Compass settings
compass:
  # Automatically remove compass when player arrives at location
  auto-dispose-on-arrival: true
  # Radius in blocks to trigger arrival
  arrival-radius: 10
  # Show distance in action bar when holding compass
  show-distance-actionbar: true
  # How often to update action bar (in ticks, 20 = 1 second)
  actionbar-update-ticks: 20
  # Show particle trail pointing toward target location
  particle-trail: true
  # Maximum distance to render particle trail (blocks)
  particle-trail-distance: 30
  # Spacing between particles (blocks)
  particle-trail-spacing: 2.0
  # Number of particles at each point
  particle-trail-density: 1

# Location limits
limits:
  # Maximum locations per player (0 = unlimited)
  max-locations-per-player: 50
  # Minimum name length
  min-name-length: 2
  # Maximum name length
  max-name-length: 32

# Database settings
database:
  # Database file name (SQLite)
  file: storage.db

# Lodestone registration settings
lodestone:
  # Enable/disable lodestone + sign registration
  enabled: true
  # Allowed tags (empty list = allow any tag)
  allowed-tags: []
  # Maximum blocks to scan for player-head structure above lodestone (0 = disabled)
  structure-scan-max-blocks: 128

# Pl3xMap web map integration
pl3xmap:
  # Enable marker display on Pl3xMap
  enabled: true
  # Layer label shown in Pl3xMap control panel
  layer-label: "Bases"
  # Show only public locations (true) or all locations (false)
  public-only: true
  # Marker icon size in pixels (square icons like blocks and heads)
  icon-size: 24
  # Banner icon width in pixels (height is automatically 2x width)
  banner-icon-width: 24
  # Tooltip HTML template
  # Placeholders: {name}, {tag}, {coords}, {creator}
  tooltip: |
    <div style="text-align:center;">
      <b style="font-size:13px;color:#f5a623;">{name}</b>
      <br><span style="color:#aaa;font-size:11px;">{tag}</span>
      <br><span style="font-size:11px;">{coords}</span>
      <br><span style="color:#8bc34a;font-size:11px;">{creator}</span>
    </div>
  # Rectangle area overlays around locations (per-tag)
  # Only tags listed below will get rectangles drawn around them
  rectangles:
    enabled: true
    # Layer label shown in Pl3xMap control panel
    layer-label: "Location Borders"
    # Hidden by default - users toggle it on in the layer controls
    default-hidden: true
    # Per-tag rectangle settings (tag names must match exactly, case-sensitive)
    # Colors are ARGB hex integers: 0xAARRGGBB
    tags:
      BASE:
        size: 200
        stroke-color: 0x800088FF
        stroke-weight: 2
        fill-color: 0x330088FF
      FARM:
        size: 100
        stroke-color: 0x8000AA00
        stroke-weight: 2
        fill-color: 0x3300AA00
